<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StreamHub - Watch Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffc107;
            border-radius: 5px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }

        .navbar {
            background: #0f0f0f;
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            border-bottom: 1px solid #272727;
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffc107, #ff9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #ffc107;
        }

        .main-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .hero {
            margin-bottom: 2rem;
            padding: 1rem 0;
        }

        .hero h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .hero p {
            color: #aaa;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem 1.5rem;
        }

        .video-card {
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .video-card:hover {
            transform: translateY(-2px);
        }

        .thumbnail-container {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 0.75rem 0.25rem;
        }

        .video-title {
            font-weight: 500;
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }

        .video-meta {
            font-size: 0.75rem;
            color: #aaa;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: #1a1a1a;
            border-radius: 12px;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
            border-top: 1px solid #272727;
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
            .hero h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🎬 StreamHub</a>
            <ul class="nav-links">
                <li><a class="nav-home">HOME</a></li>
                <li><a class="nav-categories">CATEGORIES</a></li>
                <li><a class="nav-live">LIVE CAMS</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-content">
        <div class="hero">
            <div>
                <h1 id="pageTitle">Recommended</h1>
                <p id="pageDesc">Your personal video streaming platform</p>
            </div>
        </div>
        <div class="videos-grid" id="videosGrid">
            <!-- Videos will load here -->
        </div>
    </div>

    <div class="footer">
        <p>© 2025 StreamHub - Powered by DoodStream & LuluStream</p>
    </div>

    <script>
        // MANUAL VIDEO LIST - All your videos from DoodStream and LuluStream
        const videos = [
            // DoodStream Video
            {
                id: "xkq01upu0cre",
                title: "dream-chaser 3840x2160",
                thumbnail: "https://thumbcdn.com/snaps/vmwzevmkw0z97ur3.jpg",
                embedUrl: "https://doodstream.com/e/xkq01upu0cre",
                views: "0",
                source: "DoodStream"
            },
            // LuluStream Video 1
            {
                id: "l82okacgmhcn",
                title: "Parasited Insanity Case",
                thumbnail: "https://img.lulucdn.com/l82okacgmhcn_t.jpg",
                embedUrl: "https://luluvdo.com/l82okacgmhcn",
                views: "0",
                source: "LuluStream"
            },
            // LuluStream Video 2
            {
                id: "5dcbd74hol7z",
                title: "Futanari XXX - No Need For Men Pt 1",
                thumbnail: "https://img.lulucdn.com/5dcbd74hol7z_t.jpg",
                embedUrl: "https://luluvdo.com/5dcbd74hol7z",
                views: "1",
                source: "LuluStream"
            }
        ];

        function formatViews(views) {
            if (!views || views === "0") return "0 views";
            if (views >= 1000000) return (views / 1000000).toFixed(1) + "M views";
            if (views >= 1000) return (views / 1000).toFixed(1) + "K views";
            return views + " views";
        }

        function getSourceBadge(source) {
            if (source === "DoodStream") {
                return '<span style="background: #ffc107; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px;">DS</span>';
            } else if (source === "LuluStream") {
                return '<span style="background: #00bcd4; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px;">LS</span>';
            }
            return '';
        }

        function renderVideoGrid() {
            const grid = document.getElementById('videosGrid');
            
            if (videos.length === 0) {
                grid.innerHTML = `<div class="empty-state"><h3>📁 No videos found</h3><p>Add videos to the list above</p></div>`;
                return;
            }
            
            let html = '';
            videos.forEach(video => {
                const displayTitle = video.title.length > 50 ? video.title.substring(0, 50) + '...' : video.title;
                const viewsText = formatViews(video.views);
                const sourceBadge = getSourceBadge(video.source);
                const playerUrl = `player.html?url=${encodeURIComponent(video.embedUrl)}&title=${encodeURIComponent(video.title)}&views=${encodeURIComponent(viewsText)}`;
                
                html += `
                    <a href="${playerUrl}" class="video-card">
                        <div class="thumbnail-container">
                            <img src="${video.thumbnail}" alt="${video.title}" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumbnail'">
                        </div>
                        <div class="video-info">
                            <div class="video-title">${displayTitle} ${sourceBadge}</div>
                            <div class="video-meta">${viewsText}</div>
                        </div>
                    </a>
                `;
            });
            grid.innerHTML = html;
        }

        function setupNavigation() {
            document.querySelector('.nav-home').addEventListener('click', () => {
                renderVideoGrid();
            });
            document.querySelector('.nav-categories').addEventListener('click', () => {
                document.getElementById('videosGrid').innerHTML = `<div class="empty-state"><h3>🏷️ Categories</h3><p>Coming soon</p></div>`;
            });
            document.querySelector('.nav-live').addEventListener('click', () => {
                document.getElementById('videosGrid').innerHTML = `<div class="empty-state"><h3>📡 Live Cams</h3><p>Coming soon</p></div>`;
            });
        }

        renderVideoGrid();
        setupNavigation();
    </script>
</body>
</html>
