<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StreamHub - Watch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }

        .navbar {
            background: #0f0f0f;
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            border-bottom: 1px solid #272727;
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffc107, #ff9800);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .back-link {
            color: #ffc107;
            text-decoration: none;
            font-size: 1rem;
        }

        .back-link:hover {
            color: #ffca2c;
        }

        .video-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-info {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 12px;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .video-meta {
            color: #aaa;
            font-size: 0.9rem;
        }

        .error-message {
            text-align: center;
            padding: 4rem;
            background: #1a1a1a;
            border-radius: 12px;
            color: #ff6b6b;
        }

        .redirect-message {
            text-align: center;
            padding: 4rem;
            background: #1a1a1a;
            border-radius: 12px;
            color: #ffc107;
        }

        .redirect-button {
            display: inline-block;
            background: #ffc107;
            color: #000;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: bold;
        }

        .redirect-button:hover {
            background: #ffca2c;
        }

        @media (max-width: 768px) {
            .video-container {
                padding: 1rem;
            }
            .video-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🎬 StreamHub</a>
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </nav>

    <div class="video-container">
        <div id="playerContent">
            <div class="error-message">
                <h3>⏳ Loading video...</h3>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let embedUrl = urlParams.get('url');
        const videoTitle = urlParams.get('title');
        const views = urlParams.get('views');

        const container = document.getElementById('playerContent');

        // Check if this is a LuluStream URL (cannot be embedded)
        const isLuluStream = embedUrl && (embedUrl.includes('luluvdo.com') || embedUrl.includes('lulustream.com'));

        if (!embedUrl) {
            container.innerHTML = `
                <div class="error-message">
                    <h3>❌ No video selected</h3>
                    <a href="index.html" style="color: #ffc107;">← Go to Home</a>
                </div>
            `;
        } else if (isLuluStream) {
            // LuluStream videos cannot be embedded - redirect to their site
            container.innerHTML = `
                <div class="redirect-message">
                    <h3>📺 This video is hosted on LuluStream</h3>
                    <p>LuluStream does not allow embedding. Click the button below to watch on their site.</p>
                    <a href="${embedUrl}" target="_blank" class="redirect-button">Watch on LuluStream →</a>
                    <div class="video-info" style="margin-top: 2rem;">
                        <div class="video-title">${videoTitle || 'Untitled Video'}</div>
                        <div class="video-meta">${views ? '👁️ ' + views : ''}</div>
                    </div>
                </div>
            `;
            document.title = `${videoTitle || 'Watch'} - StreamHub`;
        } else {
            // DoodStream videos can be embedded
            container.innerHTML = `
                <div class="video-wrapper">
                    <iframe src="${embedUrl}" allowfullscreen frameborder="0"></iframe>
                </div>
                <div class="video-info">
                    <div class="video-title">${videoTitle || 'Untitled Video'}</div>
                    <div class="video-meta">${views ? '👁️ ' + views : ''}</div>
                </div>
            `;
            document.title = `${videoTitle || 'Watch'} - StreamHub`;
        }
    </script>
</body>
</html>
